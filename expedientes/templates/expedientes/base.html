<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Registros Académicos{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #0065b1;
            --azul-dark: #004d8a;
            --azul-light: #e8f2fc;
            --azul-mid: #c2daf5;
            --blanco: #ffffff;
            --gris-bg: #f4f6f9;
            --gris-borde: #dde3ed;
            --gris-texto: #6b7a99;
            --verde: #16a34a;
            --verde-light: #dcfce7;
            --rojo: #dc2626;
            --rojo-light: #fee2e2;
            --sombra: 0 2px 12px rgba(0,101,177,0.10);
            --sombra-hover: 0 6px 24px rgba(0,101,177,0.18);
            --radio: 10px;
            --radio-sm: 6px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--gris-bg);
            color: #1a2340;
            min-height: 100vh;
        }
        /* NAV */
        nav {
            background: var(--azul);
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 58px;
            box-shadow: 0 2px 8px rgba(0,101,177,0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            color: var(--blanco); font-weight: 700; font-size: 15px;
            text-decoration: none;
        }
        .nav-brand svg { opacity: 0.9; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-user { color: rgba(255,255,255,0.85); font-size: 13px; }
        .btn-logout {
            background: rgba(255,255,255,0.15);
            color: var(--blanco);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 5px 14px;
            border-radius: var(--radio-sm);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.25); }

        /* TOAST */
        #toast {
            position: fixed; bottom: 28px; right: 28px; z-index: 9999;
            padding: 12px 22px; border-radius: var(--radio);
            font-size: 13px; font-weight: 500;
            background: #1a2340; color: var(--blanco);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transform: translateY(80px); opacity: 0;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.verde { background: var(--verde); }
        #toast.rojo { background: var(--rojo); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
{% if user.is_authenticated %}
<nav>
    <a class="nav-brand" href="/">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
        </svg>
        Registros Académicos
    </a>
    <div class="nav-right">
        <span class="nav-user">{{ user.get_full_name|default:user.username }}</span>
        <a href="{% url 'logout' %}" class="btn-logout">Cerrar sesión</a>
    </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

<div id="toast"></div>

<script>
function showToast(msg, tipo='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = tipo ? `show ${tipo}` : 'show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 3000);
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
