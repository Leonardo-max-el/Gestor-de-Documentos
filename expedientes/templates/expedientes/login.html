<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Registros Académicos</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #0065b1;
            --azul-dark: #004d8a;
            --blanco: #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0065b1 0%, #003d6e 60%, #001f3a 100%);
        }
        .login-card {
            background: var(--blanco);
            border-radius: 16px;
            padding: 48px 44px;
            width: 380px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.25);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            width: 64px; height: 64px;
            background: var(--azul);
            border-radius: 16px;
            display: inline-flex;
            align-items: center; justify-content: center;
            margin-bottom: 16px;
        }
        .login-logo h1 {
            font-size: 20px; font-weight: 700;
            color: #1a2340;
        }
        .login-logo p {
            font-size: 13px; color: #6b7a99; margin-top: 4px;
        }
        label {
            display: block;
            font-size: 13px; font-weight: 500;
            color: #1a2340; margin-bottom: 6px;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #dde3ed;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }
        input:focus { border-color: var(--azul); }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--azul);
            color: var(--blanco);
            border: none;
            border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-login:hover { background: var(--azul-dark); }
        .btn-login:active { transform: scale(0.98); }
        .error-msg {
            background: #fee2e2; color: #dc2626;
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 18px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
        </div>
        <h1>Registros Académicos</h1>
        <p>Sistema de Gestión de Expedientes</p>
    </div>

    {% if form.errors %}
    <div class="error-msg">Usuario o contraseña incorrectos.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label>Usuario</label>
        <input type="text" name="username" autofocus placeholder="Ingrese su usuario">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Ingrese su contraseña">
        <button type="submit" class="btn-login">Ingresar al sistema</button>
    </form>
</div>
</body>
</html>
